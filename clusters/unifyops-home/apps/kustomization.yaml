# clusters/unifyops-home/apps/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Optional but handy for traceability
labels:
  - pairs:
      cluster: unifyops-home
    includeSelectors: true
    includeTemplates: true

resources:
  # Core scaffolding
  - namespaces.yaml
  - projects.yaml

  # If you have an ArgoCD App-of-Apps or root Applications
  - root-apps.yaml
  - appset-auth.yaml
  - appset-user.yaml
  - appset-postgresql.yaml
  - appset-identity-service.yaml
  - appset-platform-api.yaml
  - appset-platform-service.yaml
  - appset-platform-worker.yaml
  - appset-portal.yaml
  - appset-secrets.yaml
  # UO-P6 slice 4: dev tenant apps (tenants/default/dev/*/values.yaml)
  - appset-tenant-apps-dev.yaml

  # Each subdir has its own kustomization.yaml
  - argocd/
  - cert-manager/
  - external-dns/
  - harbor/
  - longhorn/
  - metrics-server/
  - metallb/
  - tailscale/
  - sealed-secret/
  - nginx-private/
  - github-runner/