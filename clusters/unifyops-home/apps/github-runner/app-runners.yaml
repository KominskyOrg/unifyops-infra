apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  project: arc
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: "0.13.0"
    helm:
      values: |
        githubConfigUrl: "https://github.com/KominskyOrg"
        githubConfigSecret: "github-token"
        minRunners: 0
        maxRunners: 5

        # Runner labels - workflows use these in runs-on
        runnerScaleSetName: "arc-runners"

        controllerServiceAccount:
          namespace: arc-systems
          name: gha-runner-scale-set-controller
        containerMode:
          type: "dind"

        # Hardened runner image (kubectl/helm/yq/jq), rebuilt via the
        # build-runner-image workflow in KominskyOrg/unifyops (CI-owned
        # Harbor pushes). Rebuild + bump BEFORE GitHub deprecates the
        # bundled actions/runner version (v1.8 died that way).
        template:
          spec:
            containers:
            - name: runner
              image: harbor.unifyops.io/library/arc-runner-unifyops:v1.9
              imagePullPolicy: Always
              command: ["/home/runner/run.sh"]
            # Harbor registry credentials
            imagePullSecrets:
            - name: harbor-registry-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: github-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
