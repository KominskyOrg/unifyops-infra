apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: uo-dev
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: uo-dev
spec:
  podSelector: {}
  ingress:
    - from:
      - podSelector: {}
  egress:
  - to:
    - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ingress-controller
  namespace: uo-dev
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kube-system: "true" # adjust if your ingress runs elsewhere
        - namespaceSelector:
            matchLabels:
              name: ingress # if you dedicate an ingress ns
---
# DNS egress for all pods (UO-P0-05): jobs like the pg_dumpall backup
# CronJob match no per-app policy and could not resolve service names.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: uo-dev
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# UO-P6 slice 5: the platform worker's read-only Argo status observation.
# The chart's workerHttpsEgress rule allows port 443, but the
# argocd-server Service DNATs 443 -> targetPort 8080 and NetworkPolicy
# is evaluated POST-DNAT — so the in-cluster call needs an explicit
# allowance to the argocd-server pods on 8080. Dev-only (this file is
# the uo-dev baseline); additive to the chart-owned worker policy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-worker-argo-egress
  namespace: uo-dev
spec:
  podSelector:
    matchLabels:
      app: platform-worker
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - port: 8080
          protocol: TCP
